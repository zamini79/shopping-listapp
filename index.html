<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      font-size: 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      outline: none;
      background: #fff;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #6c63ff;
    }

    .input-row button {
      padding: 12px 20px;
      font-size: 22px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .input-row button:hover {
      background: #574fd6;
    }

    .input-row button:active {
      transform: scale(0.95);
    }

    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #888;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #e05c5c;
      cursor: pointer;
      font-size: 13px;
      padding: 0;
    }

    .clear-btn:hover {
      text-decoration: underline;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      padding: 14px 16px;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      transition: opacity 0.2s;
    }

    .item.checked {
      opacity: 0.55;
    }

    .item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #6c63ff;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 16px;
      color: #222;
      transition: text-decoration 0.2s;
      word-break: break-word;
    }

    .item.checked .item-text {
      text-decoration: line-through;
      color: #aaa;
    }

    .delete-btn {
      background: none;
      border: none;
      font-size: 18px;
      color: #ccc;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #e05c5c;
      background: #ffeaea;
    }

    .empty {
      text-align: center;
      color: #bbb;
      font-size: 15px;
      padding: 48px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템을 입력하세요" maxlength="80" />
      <button id="addBtn" title="추가">+</button>
    </div>

    <div class="stats">
      <span id="statsText"></span>
      <button class="clear-btn" id="clearChecked">완료 항목 삭제</button>
    </div>

    <ul class="list" id="list"></ul>
    <div class="empty" id="empty">아이템을 추가해 보세요!</div>
  </div>

  <script>
    const input = document.getElementById('itemInput');
    const addBtn = document.getElementById('addBtn');
    const listEl = document.getElementById('list');
    const emptyEl = document.getElementById('empty');
    const statsText = document.getElementById('statsText');
    const clearCheckedBtn = document.getElementById('clearChecked');

    let items = JSON.parse(localStorage.getItem('shoppingItems') || '[]');

    function save() {
      localStorage.setItem('shoppingItems', JSON.stringify(items));
    }

    function render() {
      listEl.innerHTML = '';

      items.forEach((item, i) => {
        const li = document.createElement('li');
        li.className = 'item' + (item.checked ? ' checked' : '');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = item.checked;
        cb.addEventListener('change', () => {
          items[i].checked = cb.checked;
          save();
          render();
        });

        const span = document.createElement('span');
        span.className = 'item-text';
        span.textContent = item.text;

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.title = '삭제';
        del.textContent = '✕';
        del.addEventListener('click', () => {
          items.splice(i, 1);
          save();
          render();
        });

        li.appendChild(cb);
        li.appendChild(span);
        li.appendChild(del);
        listEl.appendChild(li);
      });

      const total = items.length;
      const done = items.filter(it => it.checked).length;
      emptyEl.style.display = total === 0 ? 'block' : 'none';
      statsText.textContent = total > 0 ? `전체 ${total}개 · 완료 ${done}개` : '';
      clearCheckedBtn.style.visibility = done > 0 ? 'visible' : 'hidden';
    }

    function addItem() {
      const text = input.value.trim();
      if (!text) return;
      items.push({ text, checked: false });
      input.value = '';
      save();
      render();
      input.focus();
    }

    addBtn.addEventListener('click', addItem);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    clearCheckedBtn.addEventListener('click', () => {
      items = items.filter(it => !it.checked);
      save();
      render();
    });

    render();
  </script>
</body>
</html>
